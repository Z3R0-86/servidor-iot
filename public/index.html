<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Monitoreo para cultivo</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <svg version="1.1" xmlns="http://www.w3.org/2000/svg" x="0" y="0" style="display:none;">
    <symbol id="wave" viewBox="0 0 560 20">
      <path d="M420,20c21.5-0.4,38.8-2.5,51.1-4.5c13.4-2.2,26.5-5.2,27.3-5.4C514,6.5,518,4.7,528.5,2.7c7.1-1.3,17.9-2.8,31.5-2.7c0,0,0,0,0,0v20H420z"></path>
      <path d="M420,20c-21.5-0.4-38.8-2.5-51.1-4.5c-13.4-2.2-26.5-5.2-27.3-5.4C326,6.5,322,4.7,311.5,2.7C304.3,1.4,293.6-0.1,280,0c0,0,0,0,0,0v20H420z"></path>
      <path d="M140,20c21.5-0.4,38.8-2.5,51.1-4.5c13.4-2.2,26.5-5.2,27.3-5.4C234,6.5,238,4.7,248.5,2.7c7.1-1.3,17.9-2.8,31.5-2.7c0,0,0,0,0,0v20H140z"></path>
      <path d="M140,20c-21.5-0.4-38.8-2.5-51.1-4.5c-13.4-2.2-26.5-5.2-27.3-5.4C46,6.5,42,4.7,31.5,2.7C24.3,1.4,13.6-0.1,0,0c0,0,0,0,0,0l0,20H140z"></path>
    </symbol>
  </svg>

  <main class="page-shell">
    <h1>Sistema de Monitoreo para cultivo</h1>

    <section class="section-top">
      <h2>Datos Rápidos</h2>

      <div class="metrics-grid">
        <article class="card metric-card metric-temperature">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">🌡️</span>
            <span class="metric-label">Temperatura</span>
          </div>
          <div id="temp" class="metric-value">--°C</div>
          <div class="progress-track"><div id="tempBar" class="progress-fill temp-fill"></div></div>
        </article>

        <article class="card metric-card metric-humidity">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">💧</span>
            <span class="metric-label">Humedad</span>
          </div>
          <div id="hum" class="metric-value">--%</div>
          <div class="progress-track"><div id="humBar" class="progress-fill hum-fill"></div></div>
        </article>

        <article class="card metric-card metric-soil">
          <div class="metric-header">
            <span class="metric-icon soil-icon" aria-hidden="true">🌱</span>
            <span class="metric-label soil-label">Suelo</span>
          </div>

          <div class="soil-widget">
            <div class="plant" aria-hidden="true">
              <div id="leafLeft" class="leaf leaf-left"></div>
              <div id="leafRight" class="leaf leaf-right"></div>
              <div id="stem" class="stem"></div>
            </div>

            <div id="potBox" class="pot-box">
              <div class="percent">
                <div class="percentNum" id="sueloPorcentaje">0</div>
                <div class="percentB">%</div>
              </div>
              <div id="water" class="water">
                <svg viewBox="0 0 560 20" class="water_wave water_wave_back" aria-hidden="true"><use href="#wave"></use></svg>
                <svg viewBox="0 0 560 20" class="water_wave water_wave_front" aria-hidden="true"><use href="#wave"></use></svg>
              </div>
            </div>
          </div>
        </article>
      </div>
    </section>

    <section class="section-history">
      <article class="card history-card">
        <h2>Historial de Progreso</h2>

        <div class="tabs" role="tablist" aria-label="Historial de progreso">
          <button class="tab active" type="button" data-range="diario" role="tab" aria-selected="true">Diario</button>
          <button class="tab" type="button" data-range="semanal" role="tab" aria-selected="false">Semanal</button>
          <button class="tab" type="button" data-range="mensual" role="tab" aria-selected="false">Mensual</button>
        </div>

        <div class="chart-shell">
          <div class="chart-axis" aria-hidden="true">
            <span>100</span>
            <span>80</span>
            <span>60</span>
            <span>40</span>
            <span>20</span>
            <span>0</span>
          </div>
          <div id="historyChart" class="chart-area" aria-live="polite"></div>
        </div>

        <div class="chart-legend">
          <span><i class="legend-dot temp-dot"></i>Temperatura (°C)</span>
          <span><i class="legend-dot hum-dot"></i>Humedad (%)</span>
          <span><i class="legend-dot soil-dot"></i>Suelo (%)</span>
        </div>
      </article>
    </section>

    <p id="fecha"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
